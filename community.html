<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bongos Community</title>
  <style>
    :root{
      --brand:#0f9d58;
      --ink:#0b1220; --muted:#5b6471; --bg:#ffffff; --panel:#f6f8fa;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
    .wrap{max-width:760px;margin:0 auto;padding:22px}
    header{display:flex;align-items:center;gap:12px;margin:6px 0 18px}
    header img{height:56px}
    .card{background:var(--panel);border-radius:var(--radius);padding:18px;margin:14px 0;border:1px solid #e6e8eb}
    h1{font-size:26px;margin:6px 0 10px}
    h2{font-size:18px;margin:14px 0 8px}
    .muted{color:var(--muted)}
    .btn{display:inline-block;background:var(--brand);color:#fff;text-decoration:none;border:none;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}
    .btn.secondary{background:#1f2937}
    .cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .pill{display:inline-block;background:#e8f5ee;border:1px solid #cfe9dd;border-radius:999px;padding:6px 10px;font-size:13px}
    .fine{font-size:13px;color:var(--muted);margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="https://raw.githubusercontent.com/Bongosrewards/bongos-rewards/main/Bongos%20Logo%20Final.png" alt="Bongos" />
      <div>
        <div class="pill">Bongos Community Invite</div>
        <div class="muted" id="refLine"></div>
      </div>
    </header>

    <section class="card">
      <h1>You're invited 🍹</h1>
      <p class="muted">
        Join the Bongos Community for early access to new flavors, exclusive drops, and pop-up invites.
      </p>

      <div class="cta">
        <a class="btn" href="https://docs.google.com/forms/d/1hkN3ogyKxFmgsB-5kI8EPFX2OJKdFh2iI-fcS_8Cduk/viewform" target="_blank" rel="noopener">
          Join the Community
        </a>
        <a class="btn secondary" href="./index.html" id="backLink">Back to Product Info</a>
      </div>

      <p class="fine">
        21+ only. By joining you agree to receive messages from Bongos (you can opt out anytime).
      </p>
    </section>
  </div>

<script>
  const qs = new URLSearchParams(location.search);
  const ref = qs.get('ref') || '';
  const sku = qs.get('sku') || '';
  const batch = qs.get('batch') || '';

  const refLine = document.getElementById('refLine');
  if (refLine) {
    const parts = [];
    if (sku) parts.push('SKU: ' + sku);
    if (batch) parts.push('Batch: ' + batch);
    if (ref) parts.push('Source: ' + ref);
    refLine.textContent = parts.length ? parts.join(' • ') : '';
  }

  const backLink = document.getElementById('backLink');
  if (backLink && (sku || batch)) {
    const u = new URL('./index.html', location.href);
    if (sku) u.searchParams.set('sku', sku);
    if (batch) u.searchParams.set('batch', batch);
    backLink.href = u.toString();
  }
</script>
</body>
</html>
