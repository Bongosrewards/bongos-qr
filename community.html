<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Join the Bongos Community</title>
  <style>
    :root{
      --brand:#0f9d58;
      --ink:#0b1220;
      --muted:#5b6471;
      --bg:#ffffff;
      --panel:#f6f8fa;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:var(--bg);
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:22px;
    }
    .card{
      background:var(--panel);
      border-radius:var(--radius);
      padding:20px;
      border:1px solid #e6e8eb;
      margin:16px 0;
    }
    .logo{
      text-align:center;
      margin-bottom:14px;
    }
    .logo img{
      height:90px;
      max-width:100%;
    }
    h1{
      font-size:28px;
      margin:0 0 10px;
      text-align:center;
    }
    p{
      margin:0 0 12px;
    }
    .muted{
      color:var(--muted);
      text-align:center;
    }
    .field{
      margin:12px 0;
    }
    label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }
    input{
      width:100%;
      padding:12px 14px;
      border:1px solid #d6dae0;
      border-radius:12px;
      font:inherit;
    }
    .btn{
      display:inline-block;
      width:100%;
      background:var(--brand);
      color:#fff;
      text-decoration:none;
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-weight:800;
      cursor:pointer;
      font:inherit;
    }
    .btn.secondary{
      background:#1f2937;
    }
    .gate{
      position:fixed;
      inset:0;
      background:rgba(11,18,32,.85);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:99;
    }
    .gate .panel{
      background:#fff;
      max-width:520px;
      width:92%;
      border-radius:16px;
      padding:20px;
      border:1px solid #e6e8eb;
      text-align:center;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:10px;
    }
    .msg{
      background:#fdecea;
      border:1px solid #f5c2c7;
      color:#842029;
      padding:12px;
      border-radius:10px;
      margin-top:12px;
      display:none;
      text-align:center;
    }
  </style>
</head>
<body>

<div id="ageGate" class="gate" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
  <div class="panel">
    <img src="https://raw.githubusercontent.com/Bongosrewards/bongos-rewards/main/Bongos%20Logo%20Final.png" alt="Bongos" style="height:90px;margin-bottom:8px;" />
    <h1 id="gateTitle" style="font-size:24px;">Are you 21 or older?</h1>
    <p class="muted">Bongos Community is for adults 21+.</p>
    <div class="row">
      <button class="btn" id="btnYes" type="button" style="width:auto;">Yes, enter</button>
      <button class="btn secondary" id="btnNo" type="button" style="width:auto;">No</button>
    </div>
    <p id="gateMsg" class="muted" style="margin-top:12px;"></p>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/Bongosrewards/bongos-rewards/main/Bongos%20Logo%20Final.png" alt="Bongos" />
    </div>

    <h1>Join the Bongos Community</h1>
    <p class="muted">
      Get early access to new flavors, exclusive drops, event invites, and community updates.
    </p>

    <form id="communityForm">
      <div class="field">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" required />
      </div>

      <div class="field">
        <label for="emailAddress">Email Address</label>
        <input id="emailAddress" type="email" required />
      </div>

      <button class="btn" type="submit">Continue</button>
      <div id="errorBox" class="msg"></div>
    </form>
  </div>
</div>

<script>
  const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc1LPl9zBr_WjJ2L8WK1k8R6lrYx4r1Ze2cpSRXni2z1ecWbQ/viewform";
  const NAME_ENTRY = "entry.2065872804";
  const EMAIL_ENTRY = "entry.440360296";
  const REFERRAL_ENTRY = "entry.1752381403";

  function allow(){
    const gate = document.getElementById('ageGate');
    if (gate) gate.style.display = 'none';
  }

  function deny(){
    const msg = document.getElementById('gateMsg');
    if (msg) msg.textContent = 'Sorry, you must be 21+ to join the Bongos Community.';
  }

  document.getElementById('btnYes').addEventListener('click', allow);
  document.getElementById('btnNo').addEventListener('click', deny);

  const form = document.getElementById('communityForm');
  const errorBox = document.getElementById('errorBox');

  form.addEventListener('submit', function(e){
    e.preventDefault();

    errorBox.style.display = 'none';
    errorBox.textContent = '';

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('emailAddress').value.trim();

    if (!fullName || !email) {
      errorBox.textContent = 'Please enter your name and email.';
      errorBox.style.display = 'block';
      return;
    }

    try {
      const u = new URL(FORM_URL);
      u.searchParams.set('usp', 'pp_url');
      u.searchParams.set(NAME_ENTRY, fullName);
      u.searchParams.set(EMAIL_ENTRY, email);

      const qs = new URLSearchParams(window.location.search);
const ref = qs.get('ref');
const sku = qs.get('sku');
const batch = qs.get('batch');

if (ref) u.searchParams.set(REFERRAL_ENTRY, ref);
if (sku) localStorage.setItem('bongosCommunitySku', sku);
if (batch) localStorage.setItem('bongosCommunityBatch', batch);

window.location.href = u.toString();
    } catch (err) {
      errorBox.textContent = 'Something went wrong. Please try again.';
      errorBox.style.display = 'block';
    }
  });
</script>

</body>
</html>
