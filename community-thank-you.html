<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome to Bongos Community</title>
  <style>
    :root{
      --brand:#0f9d58;
      --ink:#0b1220;
      --muted:#5b6471;
      --bg:#ffffff;
      --panel:#f6f8fa;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:var(--bg);
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:22px;
    }
    .card{
      background:var(--panel);
      border-radius:var(--radius);
      padding:24px;
      border:1px solid #e6e8eb;
      margin:16px 0;
      text-align:center;
    }
    .logo img{
      height:90px;
      max-width:100%;
      margin-bottom:10px;
    }
    h1{
      margin:0 0 10px;
    }
    .muted{
      color:var(--muted);
    }
    .btn{
      display:inline-block;
      background:#0f9d58;
      color:#fff;
      text-decoration:none;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-weight:800;
      cursor:pointer;
      margin-top:16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">
        <img src="https://raw.githubusercontent.com/Bongosrewards/bongos-rewards/main/Bongos%20Logo%20Final.png" alt="Bongos" />
      </div>
      <h1>Welcome to the Bongos Community</h1>
      <p class="muted">
        You're in. Stay tuned for updates, flavor drops, invites, and community news.
      </p>
      <a class="btn" href="https://www.instagram.com/bongosmixtails/" target="_blank" rel="noopener">
        Follow us on Instagram
      </a>
    </div>
  </div>
</body>
</html>
